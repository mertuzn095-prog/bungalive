<style>
:root {
  --forest: #1a3c2a;
  --moss: #2d5a3f;
  --sage: #5a7c65;
  --leaf: #7ab58d;
  --cream: #faf8f3;
  --sand: #f0ebe0;
  --bark: #3d2b1f;
  --amber: #d4923a;
  --amber-light: #f0c97e;
  --terracotta: #c4613a;
  --stone: #8a8578;
  --white: #ffffff;
  --shadow-sm: 0 2px 8px rgba(26,60,42,0.08);
  --shadow-md: 0 8px 30px rgba(26,60,42,0.12);
  --shadow-lg: 0 20px 60px rgba(26,60,42,0.18);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--bark);
  line-height: 1.6;
}
h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
.btn {
  padding: 10px 22px; border-radius: 50px; font-weight: 600;
  font-size: 14px; cursor: pointer; border: none; transition: all 0.25s;
  font-family: 'DM Sans', sans-serif; text-decoration: none;
}
.btn-outline { background: transparent; border: 1.5px solid var(--forest); color: var(--forest); }
.btn-outline:hover { background: var(--forest); color: var(--white); }
.btn-primary { background: var(--forest); color: var(--white); }
.btn-primary:hover { background: var(--moss); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-amber { background: var(--amber); color: var(--white); }
.btn-amber:hover { background: #c0822e; transform: translateY(-1px); }

/* Navbar */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,248,243,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(26,60,42,0.08);
}
.nav-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 72px;
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--forest); }
.logo-icon {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  background: transparent; overflow: hidden;
}
.logo-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.logo-text { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--forest); }
.logo-text span { color: #8b5a1f; }
.nav-back {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--bark);
  font-weight: 500; font-size: 15px;
  padding: 10px 18px; border-radius: 50px;
  transition: all 0.2s;
}
.nav-back:hover { background: var(--sand); color: var(--forest); }

/* Hero */
.detail-hero {
  position: relative;
  height: 520px;
  overflow: hidden;
  background: var(--bark);
}
.detail-hero img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s ease;
}
.detail-hero:hover img { transform: scale(1.02); }
.detail-hero-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  padding: 60px 32px 32px;
  color: white;
}
.detail-hero-inner {
  max-width: 1200px; margin: 0 auto;
}
.detail-badge {
  display: inline-block;
  background: var(--amber);
  color: white;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 12px;
}
.detail-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 800;
  margin-bottom: 8px;
  line-height: 1.15;
}
.detail-meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 16px;
  opacity: 0.9;
}

/* Container */
.detail-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 40px;
}
@media (max-width: 900px) {
  .detail-container { grid-template-columns: 1fr; }
  .detail-hero { height: 360px; }
}

/* Content */
.detail-content {}
.section-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--forest);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::before {
  content: '';
  width: 4px;
  height: 22px;
  background: var(--amber);
  border-radius: 2px;
}

/* Quick Stats */
.quick-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 36px;
  padding: 20px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.quick-stat {
  text-align: center;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  background: var(--sand);
  transition: all 0.2s;
}
.quick-stat:hover { background: var(--cream); transform: translateY(-2px); }
.qs-icon { font-size: 28px; margin-bottom: 6px; }
.qs-val { font-weight: 700; font-size: 22px; color: var(--forest); }
.qs-label { font-size: 12px; color: var(--stone); margin-top: 2px; }
@media (max-width: 600px) { .quick-stats { grid-template-columns: repeat(2, 1fr); } }

/* Description */
.desc-section { margin-bottom: 36px; }
.desc-text {
  font-size: 16px;
  line-height: 1.9;
  color: #555;
  padding: 24px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

/* Details Grid */
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 36px;
}
.detail-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  background: var(--white);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}
.detail-item:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
.di-icon { font-size: 30px; flex-shrink: 0; }
.di-label { font-size: 12px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.5px; }
.di-value { font-size: 16px; font-weight: 600; color: var(--bark); }
@media (max-width: 600px) { .details-grid { grid-template-columns: 1fr; } }

/* Tags */
.tags-section { margin-bottom: 36px; }
.tags-list { display: flex; flex-wrap: wrap; gap: 10px; }
.tag {
  padding: 10px 20px;
  background: var(--white);
  border: 1.5px solid var(--sand);
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  color: var(--bark);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.tag:hover { border-color: var(--forest); background: var(--cream); }

/* Sidebar */
.detail-sidebar { position: sticky; top: 90px; align-self: start; }
.price-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow-md);
  margin-bottom: 20px;
}
.price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
.price-amount {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  font-weight: 700;
  color: var(--forest);
}
.price-period { font-size: 16px; color: var(--stone); }
.price-rating {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px;
  background: var(--sand);
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-weight: 600;
  font-size: 15px;
}
.price-rating .star { color: var(--amber); font-size: 20px; }
.price-rating .reviews { color: var(--stone); font-weight: 400; font-size: 13px; margin-left: auto; }
.price-actions { display: flex; flex-direction: column; gap: 10px; }
.price-actions .btn { width: 100%; padding: 14px; font-size: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* Info Card */
.info-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.info-card h4 { font-size: 15px; margin-bottom: 12px; color: var(--forest); }
.info-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.info-list li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--bark); }
.info-list li span:first-child { font-size: 18px; }

/* Similar */
.similar-section {
  padding: 60px 24px;
  background: var(--white);
  border-top: 1px solid var(--sand);
}
.similar-inner { max-width: 1200px; margin: 0 auto; }
.similar-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.similar-card {
  background: var(--cream);
  border-radius: var(--radius-sm);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: all 0.25s;
  display: block;
}
.similar-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.similar-card img { width: 100%; height: 180px; object-fit: cover; }
.similar-card-info { padding: 14px; }
.similar-card-info h4 { font-size: 16px; margin-bottom: 4px; color: var(--bark); }
.similar-card-info p { font-size: 13px; color: var(--stone); margin-bottom: 6px; }
.similar-card-price { font-weight: 700; color: var(--forest); font-size: 16px; }

/* Footer */
.footer {
  background: #0d1f15; color: rgba(255,255,255,0.7); padding: 40px 24px;
  text-align: center; font-size: 14px;
}
</style>
</head>

let currentListing = null;

// URL'den id parametresini al
function getListingId() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  return isNaN(id) ? 1 : id;
}

// Sayfayı doldur
function renderListing() {
  const id = getListingId();
  const l = listings.find(x => x.id === id);
  if (!l) {
    document.body.innerHTML = '<div style="text-align:center;padding:100px;font-size:18px;color:var(--stone);">İlan bulunamadı. <a href="index.html">Ana sayfaya dön</a></div>';

  }

  // Title
  document.title = l.title + ' - BungaLive';

  // Hero
  document.getElementById('heroImg').src = l.img;
  document.getElementById('heroImg').alt = l.title;
  document.getElementById('heroTitle').textContent = l.title;
  document.getElementById('heroLoc').textContent = '📍 ' + l.loc;
  document.getElementById('heroRating').textContent = l.rating;
  document.getElementById('heroReviews').textContent = l.reviews;

  const badge = document.getElementById('heroBadge');
  if (l.badge) {
    badge.textContent = l.badgeText;
    badge.style.display = 'inline-block';
  }

  // Quick stats
  document.getElementById('quickStats').innerHTML = `
    <div class="quick-stat">
      <div class="qs-icon">🛏️</div>
      <div class="qs-val">${l.beds}</div>
      <div class="qs-label">Yatak Odası</div>
    </div>
    <div class="quick-stat">
      <div class="qs-icon">👥</div>
      <div class="qs-val">${l.guests}</div>
      <div class="qs-label">Misafir</div>
    </div>
    <div class="quick-stat">
      <div class="qs-icon">🚿</div>
      <div class="qs-val">${l.baths}</div>
      <div class="qs-label">Banyo</div>
    </div>
    <div class="quick-stat">
      <div class="qs-icon">📐</div>
      <div class="qs-val">${l.sqm}</div>
      <div class="qs-label">m² Alan</div>
    </div>
  `;

  // Description
  document.getElementById('descText').textContent = l.desc;

  // Details grid
  document.getElementById('detailsGrid').innerHTML = `
    <div class="detail-item">
      <span class="di-icon">🏙️</span>
      <div>
        <div class="di-label">Merkeze Mesafe</div>
        <div class="di-value">${l.centerDistance}</div>
      </div>
    </div>
    <div class="detail-item">
      <span class="di-icon">🛒</span>
      <div>
        <div class="di-label">En Yakın Market</div>
        <div class="di-value">${l.marketDistance}</div>
      </div>
    </div>
    <div class="detail-item">
      <span class="di-icon">🍳</span>
      <div>
        <div class="di-label">Kahvaltı</div>
        <div class="di-value">${l.breakfast ? 'Dahil' : 'Dahil Değil'}</div>
      </div>
    </div>
    <div class="detail-item">
      <span class="di-icon">${l.payment === 'card' ? '💳' : l.payment === 'cash' ? '💵' : '💳💵'}</span>
      <div>
        <div class="di-label">Ödeme Yöntemi</div>
        <div class="di-value">${l.payment === 'card' ? 'Kredi Kartı' : l.payment === 'cash' ? 'Nakit' : 'Kredi Kartı / Nakit'}</div>
      </div>
    </div>
  `;

  // Tags
  document.getElementById('tagsList').innerHTML = l.tags.map(t =>
    `<span class="tag">${tagLabels[t] || t}</span>`
  ).join('');

  // Sidebar
  document.getElementById('sidePrice').textContent = '₺' + l.price.toLocaleString('tr-TR');
  document.getElementById('sideRating').innerHTML = `<span class="star">★</span> ${l.rating} <span class="reviews">${l.reviews} değerlendirme</span>`;

  document.getElementById('infoCenter').textContent = l.centerDistance;
  document.getElementById('infoMarket').textContent = l.marketDistance;
  document.getElementById('infoBreakfast').textContent = l.breakfast ? 'Dahil' : 'Dahil Değil';
  document.getElementById('infoPaymentIcon').textContent = l.payment === 'card' ? '💳' : l.payment === 'cash' ? '💵' : '💳💵';
  document.getElementById('infoPayment').textContent = l.payment === 'card' ? 'Kredi Kartı' : l.payment === 'cash' ? 'Nakit' : 'Kredi Kartı / Nakit';

  // Similar listings (aynı tag'lerden 3 tane)
  const others = listings.filter(x => x.id !== l.id);
  const similar = others.filter(x => x.tags.some(t => l.tags.includes(t))).slice(0, 3);
  // Eğer 3'ten azsa, diğerlerinden ekle
  const remaining = others.filter(x => !similar.includes(x));
  while (similar.length < 3 && remaining.length > 0) {
    similar.push(remaining.shift());
  }

  document.getElementById('similarGrid').innerHTML = similar.map(s => `
    <a href="listing.html?id=${s.id}" class="similar-card">
      <img src="${s.img}" alt="${s.title}" loading="lazy">
      <div class="similar-card-info">
        <h4>${s.title}</h4>
        <p>📍 ${s.loc} · ★ ${s.rating}</p>
        <div class="similar-card-price">₺${s.price.toLocaleString('tr-TR')} /gece</div>
      </div>
    </a>
  `).join('');
}

renderListing();
</script>
